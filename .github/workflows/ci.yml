name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check and package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # node-pty's install-time gyp rebuild requires node-gyp@latest, which
          # itself needs Node >= 22.
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck and build
        run: bun run check

      - name: Pack and install as a consumer
        shell: bash
        run: |
          set -euo pipefail

          pack_json="$RUNNER_TEMP/pack.json"
          npm pack --json --pack-destination "$RUNNER_TEMP" > "$pack_json"
          tarball_name="$(node -e '
            const fs = require("node:fs");
            const result = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            if (!Array.isArray(result) || !result[0]?.filename) process.exit(1);
            process.stdout.write(result[0].filename);
          ' "$pack_json")"
          tarball="$RUNNER_TEMP/$tarball_name"
          test -f "$tarball"

          consumer="$RUNNER_TEMP/consumer"
          mkdir "$consumer"
          cd "$consumer"
          npm init --yes > /dev/null
          npm install "$tarball" > /dev/null

          package="node_modules/@letta-ai/letta-acp"
          test -f "$package/dist/index.js"
          test -f "$package/dist/index.d.ts"
          test -f "$package/LICENSE"
          test -x node_modules/.bin/letta-acp

          # The adapter speaks ACP over stdio: a lone initialize request must
          # get a protocol-version response, then the agent exits on EOF.
          response="$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":1}}' \
            | ./node_modules/.bin/letta-acp)"
          echo "$response"
          node -e '
            const response = JSON.parse(process.argv[1].split("\n")[0]);
            if (response.id !== 1 || response.result?.protocolVersion !== 1) {
              throw new Error("Packaged adapter did not answer ACP initialize.");
            }
          ' "$response"
